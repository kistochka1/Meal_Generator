<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор блюда - Мой список</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 48px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            padding: 28px 24px 36px;
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #1e2b3c, #2c4c6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sub {
            color: #5a6e7c;
            border-left: 4px solid #ffa270;
            padding-left: 14px;
            margin-bottom: 28px;
        }

        .add-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 32px;
        }

        .add-section input {
            flex: 3;
            padding: 14px 18px;
            font-size: 1rem;
            border: 1.5px solid #dce5ec;
            border-radius: 44px;
            outline: none;
        }

        .add-section input:focus {
            border-color: #ff9f5b;
            box-shadow: 0 0 0 3px rgba(255, 159, 91, 0.2);
        }

        .add-section button {
            flex: 1;
            background: #2c4c6e;
            border: none;
            padding: 0 20px;
            border-radius: 44px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-section button:hover {
            background: #1f3b57;
            transform: scale(0.97);
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 12px 4px;
        }

        .list-header h2 {
            font-size: 1.4rem;
            margin: 0;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #b91c1c;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 40px;
            transition: 0.2s;
        }

        .clear-btn:hover {
            background: #ffe6e6;
        }

        .dish-list {
            background: #f8fafd;
            border-radius: 32px;
            padding: 8px;
            margin: 12px 0 22px;
            max-height: 320px;
            overflow-y: auto;
        }

        .dish-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            margin: 8px 0;
            padding: 12px 18px;
            border-radius: 60px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        .dish-name {
            font-size: 1.1rem;
            font-weight: 500;
            word-break: break-word;
        }

        .remove-dish {
            background: #ffedea;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            color: #c2410c;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.15s;
        }

        .remove-dish:hover {
            background: #ffd8cf;
            transform: scale(1.05);
        }

        .empty-message {
            text-align: center;
            color: #8ea0ae;
            padding: 30px 20px;
            font-style: italic;
        }

        .action-area {
            text-align: center;
            margin: 20px 0 12px;
        }

        .pick-btn {
            background: linear-gradient(110deg, #ff884d, #ffb162);
            border: none;
            padding: 16px 32px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            box-shadow: 0 12px 18px -10px rgba(255, 110, 28, 0.4);
            transition: 0.15s;
        }

        .pick-btn:active {
            transform: scale(0.97);
        }

        .result-card {
            background: #ecfdf5;
            margin-top: 25px;
            padding: 16px 20px;
            border-radius: 48px;
            text-align: center;
            border-left: 8px solid #ff9f5b;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #557c55;
            font-weight: 600;
        }

        .result-dish {
            font-size: 1.9rem;
            font-weight: 800;
            color: #1a3a3a;
            margin-top: 6px;
            word-break: break-word;
        }

        .info {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 15px;
            color: #6c8a9e;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🍲 Выбор блюда</h1>
    <div class="sub">Создай свой список — пусть судьба решит!</div>

    <div class="add-section">
        <input type="text" id="dishInput" placeholder="Например: Борщ, Пицца, Паста..." autocomplete="off">
        <button id="addBtn">➕ Добавить</button>
    </div>

    <div class="list-header">
        <h2>📋 Мой список</h2>
        <button id="clearAllBtn" class="clear-btn">Очистить всё</button>
    </div>

    <div id="dishListContainer" class="dish-list">
        <div class="empty-message">✨ Список пуст. Добавьте блюда выше ✨</div>
    </div>

    <div class="action-area">
        <button id="pickRandomBtn" class="pick-btn">🎲 Выбрать случайное блюдо</button>
    </div>

    <div id="resultBox" class="result-card" style="display: none;">
        <div class="result-label">🍽️ Сегодня на ужин:</div>
        <div class="result-dish" id="selectedDishName"></div>
    </div>

    <div class="info">💾 Ваш список сохраняется в браузере и не исчезнет после перезагрузки</div>
    <footer>Все данные хранятся локально на вашем устройстве</footer>
</div>

<script>
    // Ключ для localStorage
    const STORAGE_KEY = 'user_dishes_list';

    // Массив блюд (загружается из localStorage)
    let dishes = [];

    // Загрузка данных из localStorage
    function loadDishesFromStorage() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed)) {
                    dishes = parsed.filter(item => typeof item === 'string' && item.trim().length > 0);
                } else {
                    dishes = [];
                }
            } catch(e) {
                dishes = [];
            }
        }

        // Если список пуст, добавляем примеры блюд
        if (dishes.length === 0) {
            dishes = ['Борщ', 'Пельмени', 'Цезарь', 'Паста Карбонара'];
            saveDishesToStorage();
        }
    }

    // Сохранение в localStorage
    function saveDishesToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(dishes));
    }

    // Отрисовка списка
    function renderDishList() {
        const container = document.getElementById('dishListContainer');

        if (dishes.length === 0) {
            container.innerHTML = '<div class="empty-message">🍽️ Список пуст. Добавьте любимые блюда!</div>';
            return;
        }

        const itemsHtml = dishes.map((dish, index) => `
            <div class="dish-item" data-index="${index}">
                <span class="dish-name">🍜 ${escapeHtml(dish)}</span>
                <button class="remove-dish" data-index="${index}">✕</button>
            </div>
        `).join('');

        container.innerHTML = itemsHtml;

        // Добавляем обработчики на кнопки удаления
        document.querySelectorAll('.remove-dish').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const index = parseInt(btn.getAttribute('data-index'));
                if (!isNaN(index)) {
                    removeDish(index);
                }
            });
        });
    }

    // Экранирование HTML
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Добавление блюда
    function addDish() {
        const input = document.getElementById('dishInput');
        const dishName = input.value.trim();

        if (dishName === "") {
            alert("Пожалуйста, введите название блюда!");
            return;
        }

        // Проверка на дубликаты
        if (dishes.some(d => d.toLowerCase() === dishName.toLowerCase())) {
            alert("Такое блюдо уже есть в списке!");
            return;
        }

        dishes.push(dishName);
        saveDishesToStorage();
        renderDishList();
        input.value = "";

        // Скрываем результат, так как список изменился
        document.getElementById('resultBox').style.display = 'none';
    }

    // Удаление блюда
    function removeDish(index) {
        const dishName = dishes[index];
        if (confirm(`Удалить блюдо "${dishName}"?`)) {
            dishes.splice(index, 1);
            saveDishesToStorage();
            renderDishList();
            document.getElementById('resultBox').style.display = 'none';
        }
    }

    // Очистка всего списка
    function clearAllDishes() {
        if (dishes.length === 0) return;

        if (confirm("Вы уверены? Весь список блюд будет удалён.")) {
            dishes = [];
            saveDishesToStorage();
            renderDishList();
            document.getElementById('resultBox').style.display = 'none';
        }
    }

    // Выбор случайного блюда
    function pickRandomDish() {
        if (dishes.length === 0) {
            alert("Список блюд пуст! Добавьте хотя бы одно блюдо.");
            return;
        }

        const randomIndex = Math.floor(Math.random() * dishes.length);
        const chosenDish = dishes[randomIndex];

        // Показываем результат
        const resultBox = document.getElementById('resultBox');
        const selectedDishName = document.getElementById('selectedDishName');

        selectedDishName.textContent = chosenDish;
        resultBox.style.display = 'block';

        // Прокрутка к результату
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        // Добавляем эффект
        resultBox.style.transform = 'scale(1.02)';
        setTimeout(() => {
            resultBox.style.transform = '';
        }, 200);
    }

    // Инициализация приложения
    function init() {
        loadDishesFromStorage();
        renderDishList();

        // Обработчики событий
        document.getElementById('addBtn').addEventListener('click', addDish);
        document.getElementById('clearAllBtn').addEventListener('click', clearAllDishes);
        document.getElementById('pickRandomBtn').addEventListener('click', pickRandomDish);
        document.getElementById('dishInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addDish();
            }
        });
    }

    // Запуск приложения
    init();
</script>
</body>
</html></html>
